<!DOCTYPE html>
<html>
<head>
<title>Two Player Guessing Game</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:50px;
}

input{
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#game{
display:none;
}

</style>

</head>

<body>

<h1>🎮 Two Player Guessing Game</h1>

<div id="setup">

<h3>Player 1 - Enter Secret Number</h3>
<input type="number" id="p1number" min="1" max="100">

<h3>Player 2 - Enter Secret Number</h3>
<input type="number" id="p2number" min="1" max="100">

<br>
<button onclick="startGame()">Start Game</button>

</div>

<div id="game">

<h2 id="turn">Player 1 Turn</h2>

<input type="number" id="guess" placeholder="Enter guess">

<br>
<button onclick="checkGuess()">Submit Guess</button>

<h3 id="hint"></h3>

</div>

<script src="game.js"></script>

</body>
</html>
