<!DOCTYPE html>
<html>
<head>
<title>Two Player Guessing Game</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
margin-top:40px;
}

h1{
font-size:40px;
}

input{
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
}

button:hover{
background:#45a049;
}

#game{
display:none;
}

#hint{
font-size:22px;
margin-top:20px;
}

.history{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>🎮 Two Player Guessing Game</h1>

<div id="setup">

<h3>Player 1 - Enter Secret Number</h3>
<input type="password" id="p1number" placeholder="1 - 100">

<h3>Player 2 - Enter Secret Number</h3>
<input type="password" id="p2number" placeholder="1 - 100">

<br>
<button onclick="startGame()">Start Game</button>

</div>


<div id="game">

<h2 id="turn">Player 1 Turn</h2>

<input type="number" id="guess" placeholder="Enter your guess">

<br>
<button onclick="checkGuess()">Submit Guess</button>

<h3 id="hint"></h3>

<div class="history">
<h4>Player 1 Guesses:</h4>
<p id="p1history"></p>

<h4>Player 2 Guesses:</h4>
<p id="p2history"></p>
</div>

<br>
<button onclick="restartGame()">Restart Game</button>

</div>

<script src="game.js"></script>

</body>
</html>
